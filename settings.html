<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        nav {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .navLink {
            flex-grow: 1;
            flex-shrink: 1;
            border-radius: 10px;
            background-color: rgba(73, 21, 205, 0.774);
            color: white;
            padding: 5px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bolder;
            text-align: center;
        }

        .navLink:hover {
            background-color: rgba(87, 4, 4, 0.4)
        }

        h1 {
            text-align: center;
        }

        body {
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .content:hover {
            background-color: rgba(240, 248, 255, 0.258);
        }

        .content {
            display: flex;
            justify-content: space-between;
            padding-left: 30px;
            padding-right: 30px;
            color: aliceblue;
            font-size: large;
        }

        .container {
            background-color: rgba(87, 4, 4, 0.128);
            margin: 10px;
            color: azure;
        }

        .confirm {
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }

        #done {
            background-color: green;
        }

        #cancel {
            background-color: red;
        }

        #done:hover {
            background-color: rgba(20, 158, 10, 0.416);
        }

        #cancel:hover {
            background-color: rgba(209, 18, 27, 0.655);
        }
    </style>
    <title>Settings</title>
</head>

<body>
    <!-- <h1>SETTINGS</h1> -->
    <nav>
        <a class="navLink" href="clock.html">CLOCK</a>
        <a class="navLink" href="stopwatch.html">STOP WATCH</a>
    </nav>
    <div class="confirm">
        <button id="cancel">CANCEL</button>
        <button id="done" onclick="newchanges()">DONE</button>
    </div>
    <div class="container">
        <p style="text-align: center;"><b>DEFAULT RINGTONES</b></p>
        <hr>
        <div class="content">
            <h5>Double beep</h5><input id="sounds1" value="Beep" name="ringtone" onclick="playSound('beep')"
                type="radio">
        </div>
        <hr>
        <div class="content">
            <h5>Musical bell</h5><input id="sounds2" name="ringtone" value="Bell" onclick="playSound('bell')"
                type="radio">
        </div>
        <hr>
        <div class="content">
            <h5>guitar</h5><input id="sounds3" name="ringtone" value="guiter" onclick="playSound('guitar')"
                type="radio">
        </div>
        <hr>
        <div class="content">
            <h5>Roaster</h5><input id="sounds4" name="ringtone" value="Roaster" onclick="playSound('roaster')"
                type="radio">
        </div>
    </div>
    <div class="container">
        <p style="text-align: center;"><b>APPEARANCE</b></p>
        <hr>
        <div class="content">
            <h5>Dark Mode</h5><input name="Mode" id="dark" value="Dark" type="radio">
        </div>
        <hr>
        <div class="content">
            <h5>Light Mode</h5><input name="Mode" id="light" value="Light" type="radio">
        </div>
        <hr>
        <div class="content">
            <h5>Font size</h5>
            <input type="number" min="8" id="size" style="width:30px;height: 30px; border: none;" placeholder="px">
        </div>
    </div>
    <audio id="beep" src="CSS/JAVASCRIPT/AUDIO/clock.mp3" preload="auto"></audio>
    <audio id="bell" src="CSS/JAVASCRIPT/AUDIO/bell.mp3" preload="auto"></audio>
    <audio id="guitar" src="CSS/JAVASCRIPT/AUDIO/guitar.mp3" preload="auto"></audio>
    <audio id="roaster" src="CSS/JAVASCRIPT/AUDIO/roaster.mp3" preload="auto"></audio>
</body>
<script src="CSS/JAVASCRIPT/settings.js">
</script>


</html>
