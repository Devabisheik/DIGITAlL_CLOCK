<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGITAL CLOCK</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      font-family: sans-serif;
      padding: 1rem;
    }

    header h2 {
      font-size: 2rem;
      color: black;
      cursor: pointer;
    }

    header h2:hover {
      color: #0b88f5;
    }

    nav {
      display: flex;
      justify-content:space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }

    .navLink {
      padding: 10px 20px;
      background-color: #4facfe;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }

    .navLink:hover {
      background-color: #0b88f5;
    }

    .outer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin: 1rem auto;
      width: 100%;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.2);
      border: 2px double aliceblue;
      padding: 1rem;
      width: 100%;
      max-width: 500px;
    }

    .container span {
      color: #fff;
      font-size: 4rem;
      font-weight: bold;
      font-style: oblique;
    }

    #session {
      font-size: 1.5rem;
      margin-left: 10px;
    }

    .alarmList {
      font-size: 0.8rem;
      color: lightblue;
      background-color: rgba(8, 46, 89, 0.1);
      border: 2px dashed rgba(255, 255, 255, 0.308);
      font-weight: bold;
      padding: 0.5rem;
      width: 90%;
      max-width: 500px;
    }

    .flashsms {
      color: #8c0303;
      background-color: rgb(0, 145, 255);
      font-weight: bold;
      font-size: 1rem;
    }

    .alarm {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      background: linear-gradient(to right, #3a1c71, #d76d77, #ffaf7b);
      gap: 10px;
      padding: 1rem;
      margin: 10px 0;
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
    }

    .alarm input,
    .alarm select {
      height: 40px;
      width: 80px;
      font-size: 1rem;
      text-align: center;
      border-radius: 5px;
    }

    #alarmToggleBox {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #done {
      background-color: green;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
    }

    #setalarm {
      background-color: #4facfe;
      color: white;
      border-radius: 8px;
      padding: 10px 20px;
      border: none;
      font-weight: bolder;
      font-size: 1rem;
      margin-top: 1rem;
    }

    #setalarm:hover {
      background-color: #0b88f5;
    }
    @media (max-width: 480px) {
      .container span {
        font-size: 2.5rem;
      }

      #session {
        font-size: 1.2rem;
      }

      .alarm input,
      .alarm select {
        width: 60px;
        height: 35px;
      }

      .navLink {
        font-size: 0.9rem;
        padding: 8px 14px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div onclick="window.location.href='mailto:abisheikmister@gmail.com?subject=Feedback about the digital clock App to developer&body=This is the message to developer to add some features';">
      <h2><i>DIGITAL CLOCK</i></h2>
    </div>
  </header>

  <nav>
    <a class="navLink" href="stopwatch.html">STOP WATCH</a>
    <a class="navLink" href="settings.html">SETTINGS</a>
  </nav>

  <div class="outer">
    <div class="container">
      <span id="hrs">00</span>
      <span class="colon">:</span>
      <span id="min">00</span>
      <span class="colon">:</span>
      <span id="sec">00</span>
      <span id="session">AM</span>
    </div>

    <div class="alarmList">
      <h2>ALARM LIST</h2>
    </div>

    <p class="flashsms"></p>

    <div id="alarmToggleBox">
      <div class="alarm">
        <input id="hour" type="number" min="1" max="12" placeholder="hours">
        <div class="colon">:</div>
        <input id="minute" type="number" min="0" max="59" placeholder="minutes">
        <select id="alarm_session">
          <option value="none">AM/PM</option>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <button id="done" onclick="addalarm()">done</button>
    </div>

    <button id="setalarm" onclick='toggleAlarmBox()'>SET ALARM</button>
  </div>

  <!-- Audio files -->
  <audio id="beep" src="CSS/JAVASCRIPT/AUDIO/clock.mp3" preload="auto"></audio>
  <audio id="bell" src="CSS/JAVASCRIPT/AUDIO/bell.mp3" preload="auto"></audio>
  <audio id="guitar" src="CSS/JAVASCRIPT/AUDIO/guitar.mp3" preload="auto"></audio>
  <audio id="roaster" src="CSS/JAVASCRIPT/AUDIO/roaster.mp3" preload="auto"></audio>
<script src="CSS/JAVASCRIPT/clock.js"></script>
</body>

</html>
