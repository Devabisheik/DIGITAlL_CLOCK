<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGITAL CLOCK</title>
  <style>
    body {
      /* background: linear-gradient(to right, #1e3c72, #2a0845); */
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;

    }

    header:hover {
      color: #0b88f5;
    }

    label {
      color: black;
      font-size: 2rem;
    }

    #setalarm {
      background-color: #4facfe;
      color: white;
      border-radius: 8px;
      padding: 8px 16px;
      border: none;
      font-weight: bolder;
    }

    #setalarm:hover {
      background-color: #0b88f5;
    }

    .alarm {
      height: 15vh;
      width: 50vw;
      background: linear-gradient(to right, #3a1c71, #d76d77, #ffaf7b);
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    .alarm input,
    select {
      height: 40%;
      width: 20%;
    }

    /* ✅ NEW: hide outer alarm box initially */
    #alarmToggleBox {
      display: none;
    }

    .container {
      background: rgba(255, 255, 255, 0.2);
      border: 2px double aliceblue;
      height: auto;
      width: 80%;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-wrap: wrap;
    }

    .outer {
      height: 82vmin;
      width: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex-wrap: wrap;
      /* flex-grow: 2; */
    }

    span {
      color: #ffffff;
      font-weight: bolder;
      font-size: 5rem;
      font-style: oblique;
    }

    #session {
      font-size: large;
      font-style: normal;
    }

    .alarmList {
      font-size: xx-small;
      color: lightblue;
      margin-top: 10px;
      width: auto;
      height: auto;
      background-color: rgba(8, 46, 89, 0.1);
      border: 2px dashed rgba(255, 255, 255, 0.308);
      font-weight: bold;

    }

    .flashsms {
      color: #8c0303;
      background-color: rgb(0, 145, 255);
      font-family: monospace;
      font-weight: bolder;
      font-size: larger;
    }

    nav {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }

    .navLink {
      flex-grow: 1;
      flex-shrink: 1;
      border-radius: 10px;
      background-color: #4facfe;
      color: white;
      padding: 5px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bolder;
      text-align: center;
    }

    .navLink:hover {
      background-color: #0b88f5;
    }
  </style>
</head>

<body>
  <header>
  <div onclick="window.location.href='mailto:abisheikmister@gmail.com?subject=Feedback about the digital to developer&body=This is the message to developer to add some features';"
    style="cursor: pointer;"><h2><i>DIGITAL CLOCK</i></h2>
  </div>
  </header>
  <nav>
    <a class="navLink" href="stopwatch.html">STOP WATCH</a>
    <a class="navLink" href="settings.html">SETTINGS</a>
  </nav>
  <div class="outer">
    <div class="container" id="aravind">
      <span id="hrs">00</span>
      <span class="colon">:</span>
      <span id="min">00</span>
      <span class="colon">:</span>
      <span id="sec">00</span>
      <span id="session">AM</span>
    </div>
    <div class="alarmList">
      <h2>ALARM LIST</h2>
    </div>
    <p class="flashsms"></p>
    <div id="alarmToggleBox">
      <div class="alarm">
        <input id="hour" type="number" min="1" max="12" placeholder="hours">
        <div class="colon">:</div>
        <input id="minute" type="number" min="0" max="59" placeholder="minutes">
        <select id="alarm_session">
          <option value="none">AM/PM</option>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <button id="done" style="background-color: green;" onclick="addalarm()">done</button>
    </div>

  </div>
  <audio id="beep" src="/CSS/JAVASCRIPT/AUDIO/clock.mp3" preload="auto"></audio>
  <audio id="bell" src="/CSS/JAVASCRIPT/AUDIO/bell.mp3" preload="auto"></audio>
  <audio id="guitar" src="/CSS/JAVASCRIPT/AUDIO/guitar.mp3" preload="auto"></audio>
  <audio id="roaster" src="/CSS/JAVASCRIPT/AUDIO/roaster.mp3" preload="auto"></audio>
  <button id="setalarm" onclick='toggleAlarmBox()'>SET ALARM</button>

  <script src="CSS/JAVASCRIPT/clock.js"></script>
</body>

</html>
